# .github/workflows/weekly_digest.yml
#
# Runs the NewsClip agent every Monday at 07:00 Lisbon time (06:00 UTC).
# Can also be triggered manually from the GitHub Actions UI.
#
# Required repository secrets (Settings → Secrets → Actions):
#   ANTHROPIC_API_KEY   — from console.anthropic.com
#   RESEND_API_KEY      — from resend.com
#   DIGEST_EMAIL        — where to send the digest, e.g. you@gmail.com
#   SENDER_EMAIL        — verified sender in Resend, e.g. digest@yourdomain.com

name: Weekly News Digest

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC = 07:00 Lisbon (WET/GMT)
  workflow_dispatch:        # Allows manual run from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic sendgrid

      - name: Run NewsClip agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          DIGEST_EMAIL:      ${{ secrets.DIGEST_EMAIL }}
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
        run: python news_agent.py
